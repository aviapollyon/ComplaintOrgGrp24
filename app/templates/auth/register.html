{% extends "base.html" %}
{% block title %}Register — DUT Grievance Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">
          <i class="bi bi-person-plus me-2 text-primary"></i>Create Account
        </h4>
        <form method="POST" action="{{ url_for('auth.register') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" required/>
          </div>

          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" required/>
            <div class="form-text">Use your @dut4life.ac.za student email.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>

          <div class="mb-4">
            <div class="form-text">All accounts created through this page are Student accounts.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <hr/>
        <p class="text-center mb-0 small">
          Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
