{% extends "base.html" %}
{% block title %}Forgot Password - DUT Grievance Portal{% endblock %}

{% block content %}
<section class="auth-modern-shell">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
      <div class="auth-modern-form">
        <h3 class="auth-form-title mb-1">Forgot your password?</h3>
        <p class="auth-form-sub mb-4">
          Enter your email and we will send a secure reset link if an active account exists.
        </p>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

          <div class="mb-4">
            <label class="form-label fw-semibold small">Email address</label>
            <div class="input-icon-wrap">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" name="email" class="form-control" placeholder="name@dut4life.ac.za or name@dut.ac.za" required autofocus/>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-send me-2"></i>Send Reset Link
          </button>
        </form>

        <div class="text-center mt-4 small">
          <a href="{{ url_for('auth.login') }}" class="fw-semibold text-decoration-none">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
